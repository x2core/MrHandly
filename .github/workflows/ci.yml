name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  agent:
    name: agent (go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: agent/go.mod

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          "$(go env GOPATH)/bin/staticcheck" ./...

      - name: test
        run: go test -race ./...

      - name: bench (regression gate — sampler + procfs hot paths)
        run: make bench

      - name: build (CGO off, must stay static)
        env:
          CGO_ENABLED: '0'
        run: go build ./...

  protocol:
    name: protocol (ts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/protocol
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: packages/protocol/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: typecheck (tsc)
        run: pnpm typecheck

      - name: lint (eslint)
        run: pnpm lint

  # desktop/core — the webkit-free Rust crate (peers, agent HTTP/SSE client).
  # A real gate: it builds and tests anywhere, no GUI toolkit needed.
  desktop-core:
    name: desktop core (rust)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop/core
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test

  # desktop UI — Vite/React frontend. A real gate: typecheck, lint, build.
  desktop-ui:
    name: desktop ui (ts)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm build

  # desktop shell — the thin Tauri glue. It needs the system webkit toolkit,
  # which the bare CI image and the dev sandbox lack, so this is advisory: it
  # runs clippy when the deps install cleanly but does not block the gate. The
  # shell's real verification is a local `pnpm tauri dev` (docs/ROADMAP.md M4).
  desktop-tauri:
    name: desktop shell (tauri, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: system deps (tauri v2)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev libxdo-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: build frontend (tauri-build reads ../dist)
        working-directory: desktop
        run: |
          pnpm install --frozen-lockfile
          pnpm build
      - name: cargo clippy (src-tauri)
        working-directory: desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings
